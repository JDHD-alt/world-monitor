<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>World Monitor — Global Intelligence Dashboard</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#060612;--bg2:#0c0c20;--bg3:#12122a;--card:#16163a;--card2:#1a1a3e;--txt:#e0e0f0;--txt2:#8888b0;--txt3:#555580;--accent:#4488ff;--accent2:#8855ff;--green:#34d399;--red:#ff4466;--orange:#ff8833;--yellow:#fbbf24;--border:#1e1e40;--radius:8px;--font:'Inter',system-ui,-apple-system,sans-serif;--mono:'JetBrains Mono','Cascadia Code','Fira Code',monospace}
html,body{height:100%;overflow:hidden;font-family:var(--font);background:var(--bg);color:var(--txt);font-size:14px;-webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility}
#app{height:100%;display:flex;flex-direction:column}
.top-bar{display:flex;align-items:center;justify-content:space-between;padding:8px 20px;background:#0a0a1e;border-bottom:1px solid var(--border);gap:16px;z-index:100;min-height:52px;flex-shrink:0;backdrop-filter:blur(12px)}
.top-left{display:flex;align-items:center;gap:12px}
.logo{width:24px;height:24px;border:2px solid var(--accent);border-radius:50%;display:flex;align-items:center;justify-content:center;color:var(--green);font-size:12px;font-weight:800;box-shadow:0 0 16px rgba(68,136,255,.25)}
.app-title{font-size:15px;font-weight:700;letter-spacing:-.3px;background:linear-gradient(135deg,var(--accent),#8855ff,#c084fc);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.top-center{display:flex;align-items:center;gap:16px;flex:1;max-width:560px}
.view-toggle{display:flex;gap:2px;background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:3px}
.view-btn{padding:5px 14px;border:none;background:transparent;color:var(--txt2);cursor:pointer;border-radius:5px;font-size:12px;font-weight:500;transition:all .2s}
.view-btn:hover{color:var(--txt)}
.view-btn.active{background:var(--accent);color:#fff;box-shadow:0 2px 8px rgba(68,136,255,.3)}
.search-bar{flex:1;position:relative}
.search-bar input{width:100%;padding:7px 14px;background:var(--bg2);border:1px solid var(--border);border-radius:8px;color:var(--txt);font-size:13px;outline:none;transition:all .2s}
.search-bar input:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(68,136,255,.1)}
.search-bar input::placeholder{color:var(--txt3)}
.top-right{display:flex;align-items:center;gap:10px}
.status-dot{width:7px;height:7px;border-radius:50%;display:inline-block}
.status-dot.online{background:var(--green);box-shadow:0 0 8px var(--green)}
.status-dot.loading{background:var(--yellow);animation:pulse 1s infinite}
.status-dot.error{background:var(--red)}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.status-text{font-size:11px;color:var(--txt2);font-weight:500}
.icon-btn{padding:5px 10px;border:none;background:transparent;color:var(--txt2);cursor:pointer;font-size:15px;border-radius:6px;transition:all .2s}
.icon-btn:hover{background:var(--bg3);color:var(--txt)}
.main{display:flex;flex:1;overflow:hidden;position:relative}
.map-area{flex:1;position:relative;overflow:hidden;background:radial-gradient(ellipse at center,#0c0c24,#060612)}
.panel-left,.panel-right{width:340px;display:flex;flex-direction:column;gap:0;background:var(--bg);overflow-y:auto;overflow-x:hidden;flex-shrink:0}
.panel-left{border-right:1px solid var(--border)}
.panel-right{border-left:1px solid var(--border)}
.panel-bottom{position:absolute;bottom:0;left:0;right:0;height:160px;background:rgba(12,12,32,.92);border-top:1px solid var(--border);backdrop-filter:blur(8px)}
.panel{background:transparent;display:flex;flex-direction:column;overflow:hidden}
.panel:not(:last-child){border-bottom:1px solid var(--border)}
.panel-header{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;border-bottom:1px solid var(--border);flex-shrink:0}
.panel-header h3{font-size:12px;font-weight:600;text-transform:uppercase;letter-spacing:.6px;color:var(--txt2);display:flex;align-items:center;gap:7px}
.panel-controls{display:flex;gap:6px;align-items:center}
.panel-controls select,.panel-controls input{padding:4px 8px;background:var(--bg2);border:1px solid var(--border);border-radius:6px;color:var(--txt);font-size:11px;outline:none}
.panel-controls select:focus,.panel-controls input:focus{border-color:var(--accent)}
.news-items{flex:1;overflow-y:auto;padding:6px}
.news-item{display:block;padding:8px 12px;text-decoration:none;color:var(--txt);border-radius:6px;margin-bottom:2px;transition:all .15s;border-left:3px solid transparent}
.news-item:hover{background:var(--bg3)}
.news-item.alert{border-left-color:var(--red);background:rgba(255,68,102,.06)}
.news-item-header{display:flex;align-items:center;gap:6px;margin-bottom:4px;font-size:11px}
.news-source{color:var(--accent);font-weight:600}
.news-cat{font-size:9px;padding:1px 7px;border-radius:10px;background:var(--bg2);color:var(--txt2);text-transform:uppercase;letter-spacing:.3px;font-weight:500}
.news-time{margin-left:auto;color:var(--txt3);font-size:10px}
.news-title{font-size:12.5px;font-weight:500;line-height:1.45;margin-bottom:3px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;color:var(--txt)}
.news-desc{font-size:11px;color:var(--txt2);display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;line-height:1.4}
.news-status{padding:6px 14px;font-size:11px;color:var(--txt3);border-top:1px solid var(--border);flex-shrink:0}
.markets-grid{flex:1;overflow-y:auto;padding:6px;scrollbar-width:thin}
.depth-list{flex:1;overflow-y:auto;padding:6px;scrollbar-width:thin}
.country-card{padding:8px 12px;border-radius:6px;margin-bottom:2px;cursor:pointer;transition:all .15s;border-left:3px solid var(--txt3);background:transparent}
.country-card.critical{border-left-color:var(--red)}
.country-card.high{border-left-color:var(--orange)}
.country-card.elevated{border-left-color:var(--yellow)}
.country-card.medium{border-left-color:var(--accent)}
.country-card.low{border-left-color:var(--green)}
.country-card:hover{background:var(--bg3)}
.country-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:4px}
.country-name{font-weight:600;font-size:13px;color:var(--txt)}
.risk-badge{font-size:9px;padding:2px 8px;border-radius:10px;text-transform:uppercase;font-weight:700;letter-spacing:.4px}
.risk-critical{background:rgba(255,68,102,.15);color:var(--red)}
.risk-high{background:rgba(255,136,51,.15);color:var(--orange)}
.risk-elevated{background:rgba(251,191,36,.15);color:var(--yellow)}
.risk-medium{background:rgba(68,136,255,.15);color:var(--accent)}
.risk-low{background:rgba(52,211,153,.15);color:var(--green)}
.country-stats{display:flex;gap:12px;font-size:11px;color:var(--txt2);margin-bottom:4px;flex-wrap:wrap}
.stat{display:flex;align-items:center;gap:4px}
.stat-label{color:var(--txt3)}
.stability-bar{width:50px;height:3px;background:var(--bg2);border-radius:2px;overflow:hidden}
.stability-fill{height:100%;background:linear-gradient(90deg,var(--red),var(--yellow),var(--green));border-radius:2px;transition:width .5s}
.country-signals{display:flex;flex-wrap:wrap;gap:3px}
.signal-tag{font-size:9px;padding:1px 6px;border-radius:4px;background:var(--bg2);color:var(--accent);font-weight:500}
.events-ticker{display:flex;gap:6px;padding:6px 14px;overflow-x:auto;white-space:nowrap;scrollbar-width:thin;min-height:44px;align-items:center}
.event-item{display:inline-flex;align-items:center;gap:6px;padding:4px 10px;background:var(--card);border-radius:6px;font-size:11px;cursor:pointer;flex-shrink:0;transition:all .15s;height:32px}
.event-item:hover{background:var(--bg3);transform:translateY(-1px)}
.event-item.earthquake{border:1px solid rgba(255,68,68,.2)}
.event-item.wildfire{border:1px solid rgba(255,136,0,.2)}
.event-item.flood{border:1px solid rgba(68,136,255,.2)}
.event-item.cyclone{border:1px solid rgba(251,191,36,.2)}
.event-item.volcano{border:1px solid rgba(255,68,255,.2)}
.event-item.drought{border:1px solid rgba(204,136,68,.2)}
.event-item.disaster{border:1px solid rgba(136,136,136,.2)}
.event-icon{font-size:12px}
.event-severity{color:var(--txt3);font-size:7px}
.event-time{color:var(--txt3);font-size:10px;font-weight:500}
.badge{background:var(--accent);color:#fff;font-size:10px;padding:1px 8px;border-radius:10px;font-weight:600}
.signal-bar{display:flex;gap:6px;align-items:center}
.signal-chip{font-size:10px;padding:2px 10px;border-radius:12px;background:rgba(68,136,255,.12);color:var(--accent);white-space:nowrap;font-weight:500;letter-spacing:.2px}
.tag{font-size:10px;padding:1px 6px;border-radius:10px;font-weight:500}
.tag-military{background:rgba(255,68,102,.12);color:var(--red)}
.tag-finance{background:rgba(52,211,153,.12);color:var(--green)}
.tag-tech{background:rgba(68,136,255,.12);color:var(--accent)}
.tag-cyber{background:rgba(136,85,255,.12);color:var(--accent2)}
.tag-energy{background:rgba(255,136,51,.12);color:var(--orange)}
.tag-disaster{background:rgba(255,68,68,.12);color:var(--red)}
.tag-positive{background:rgba(52,211,153,.1);color:var(--green)}
.tag-science{background:rgba(68,136,255,.1);color:var(--accent)}
.tag-general{background:var(--bg2);color:var(--txt2)}
.pulse-dot{display:inline-block;width:6px;height:6px;border-radius:50%;background:var(--green);box-shadow:0 0 8px var(--green);animation:pulse 2s infinite}
.market-item{display:grid;grid-template-columns:50px 1fr auto auto;gap:8px;align-items:center;padding:6px 10px;border-radius:4px;font-size:12px;transition:all .15s}
.market-item:hover{background:var(--bg3)}
.market-item.up{border-left:2px solid var(--green)}
.market-item.down{border-left:2px solid var(--red)}
.market-symbol{font-family:var(--mono);font-weight:600;font-size:11px;color:var(--txt)}
.market-name{color:var(--txt2);font-size:11px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.market-price{font-family:var(--mono);font-size:12px;text-align:right;color:var(--txt)}
.market-change{text-align:right;font-family:var(--mono);font-size:11px;font-weight:600}
.green{color:var(--green)}
.red{color:var(--red)}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
::-webkit-scrollbar-thumb:hover{background:var(--txt3)}
@media(max-width:1200px){.panel-left,.panel-right{width:290px}}
#flatmap{width:100%;height:100%;position:absolute;top:0;left:0;z-index:1;display:none}
#flatmap .leaflet-tile-pane{filter:invert(1)hue-rotate(180deg)}
#flatmap .leaflet-popup-content-wrapper,#flatmap .leaflet-popup-tip{background:#0c0c20;color:#e0e0f0;border:1px solid #1e1e40;border-radius:8px}
#flatmap .leaflet-popup-close-button{color:#8888b0!important}
.leaflet-container{background:#060612!important}
@media(max-width:768px){.panel-left,.panel-right{display:none}.top-center{max-width:100%}.signal-bar{display:none}}
</style>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

  </div>
</div>

let globe,points=[],arcs=[],news=[],markets=[],events=[],countries=[],loading=true;
const mapEl=document.getElementById('map'),pnews=document.getElementById('pnews'),pmarkets=document.getElementById('pmarkets'),pintel=document.getElementById('pintel'),pevents=document.getElementById('pevents');
let flatMap=null,flatMapInitialized=false;

// ---- INIT ----
async function init(){
  try{
    globe=Globe()(mapEl)
      .globeImageUrl('//unpkg.com/three-globe/example/img/earth-blue-marble.jpg')
      .backgroundImageUrl('//unpkg.com/three-globe/example/img/night-sky.png')
      .pointAltitude('size').pointColor('color').pointLabel('label').pointRadius(.6).pointsMerge(true)
      .labelLat(d=>d.lat).labelLng(d=>d.lon).labelText(d=>d.label||'').labelSize(1.2).labelColor(()=>'#fff').labelDotRadius(.3).labelResolution(2)
      .enablePointerInteraction(true)
      .onPointHover(p=>{mapEl.style.cursor=p?'pointer':'default';if(p)globe.tooltip().text(`<div style="background:#1a1a2e;color:#e0e0e0;padding:8px 12px;border-radius:6px;font-size:13px;border:1px solid #333;max-width:300px">${p.label}</div>`)})
      .onPointClick(p=>{if(p)globe.pointOfView({lat:p.lat,lng:p.lon,altitude:1.5},1e3)});
    globe.width(mapEl.clientWidth);globe.height(mapEl.clientHeight);
    new ResizeObserver(()=>{globe.width(mapEl.clientWidth);globe.height(mapEl.clientHeight)}).observe(mapEl);
    renderPanels();
    await loadAll();
  }catch(e){setStatus('error','Init failed: '+e.message)}
}

  L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png',{maxZoom:10}).addTo(flatMap);
  L.control.zoom({position:'bottomright'}).addTo(flatMap);
  // add markers for events
  renderFlatMapMarkers();
}

function renderFlatMapMarkers(){
  if(!flatMap||!flatMapInitialized)return;
  // clear old markers
  flatMap.eachLayer(l=>{if(l instanceof L.Marker||l instanceof L.CircleMarker)flatMap.removeLayer(l)});
  events.slice(0,50).forEach(e=>{
    const color=e.type==='earthquake'?'#ff4444':e.type==='wildfire'?'#ff8800':e.type==='flood'?'#4488ff':e.type==='cyclone'?'#ffcc33':e.type==='volcano'?'#ff44ff':'#888888';
    L.circleMarker([e.lat,e.lon],{radius:Math.min(e.severity*4,15),fillColor:color,color:color,weight:1,opacity:.8,fillOpacity:.5})
      .bindPopup(`<b>${esc(e.title)}</b><br>${esc(e.details||'')}`).addTo(flatMap);
  });
  countries.filter(c=>c.riskLevel==='critical'||c.riskLevel==='high').slice(0,30).forEach(c=>{
    L.circleMarker([c.lat,c.lon],{radius:8,fillColor:'#ff4444',color:'#ff4444',weight:1,opacity:.4,fillOpacity:.2}).addTo(flatMap);
  });
}

function setView(v){
  const g=document.getElementById('flatmap'),m=document.querySelector('#map canvas');
  if(v==='flat'){
    if(g)g.style.display='block';
    if(m)m.style.display='none';
    initFlatMap();
    setTimeout(renderFlatMapMarkers,500);
  }else{
    if(g)g.style.display='none';
    if(m)m.style.display='block';
    if(globe)globe.pointOfView({lat:15,lng:0,altitude:1.8});
  }
}
function setStatus(state,text){
  document.getElementById('sd').className='status-dot '+state;
  document.getElementById('st').textContent=text;
}

// ---- GEO-CODING NEWS ----
function geoCodeNews(items){
  return items.map(item=>{
    const t=((item.title||'')+' '+(item.desc||'')).toLowerCase();
    let best=null,bestLen=0;
    Object.entries(COUNTRY_ALIASES).forEach(([name,code])=>{
      if(t.includes(name)&&name.length>bestLen){best=code;bestLen=name.length;}
    });
    if(best){
      const c=COUNTRIES[best];
      return{...item,lat:c.lat,lon:c.lon};
    }
    return item;
  });
}

// ---- DATA LOADING ----
async function loadAll(){
  setStatus('loading','Loading...');
  const r=await Promise.allSettled([fetchNews(),fetchGDELT(),fetchMarkets(),fetchEvents()]);
  news=[];[0,1].forEach(i=>{const x=r[i];if(x.status==='fulfilled')news.push(...x.value)});
  news.sort((a,b)=>new Date(b.date)-new Date(a.date));
  news=news.slice(0,500);
  if(news.length&&!news[0].title)setStatus('error','Bad news data structure');
  updateNewsPanel();
  updateMarketsPanel();
  updateEventsPanel();
  updateGlobe();
  analyzeCountries();
  doSearch();
  setStatus('online',`${news.length} articles · ${events.length} events`);
  if(flatMapInitialized)renderFlatMapMarkers();
}

async function fetchFeed(feed){
  const u=feed.url.startsWith('http')?feed.url:'https:'+feed.url;
  for(const p of CORS_PROXIES){
    try{
      const r=await fetch(p+encodeURIComponent(u),{signal:AbortSignal.timeout(8e3)});
      if(!r.ok)continue;
      const t=await r.text();if(t.length<50)continue;
      const d=new DOMParser().parseFromString(t,'text/xml');
      const items=[...d.querySelectorAll('item,entry')].map((e,i)=>({
        id:feed.id+'-'+i,source:feed.name,title:(e.querySelector('title')?.textContent||'').trim(),
        link:e.querySelector('link')?.textContent||e.querySelector('link')?.getAttribute('href')||'',
        date:e.querySelector('pubDate')?.textContent||e.querySelector('updated')?.textContent||new Date().toISOString(),
        desc:(e.querySelector('description')?.textContent||e.querySelector('summary')?.textContent||'').slice(0,500),
        cat:feed.cat,importance:feed.cat==='military'||feed.cat==='disaster'?2:1
      })).filter(x=>x.title);
      if(items.length)return items;
    }catch(e){continue}
  }return[];
}

async function fetchNews(){
  const results=await Promise.allSettled(FEEDS.map(f=>fetchFeed(f)));
  const all=[];results.forEach(r=>{if(r.status==='fulfilled')all.push(...r.value)});
  return geoCodeNews(all);
}

async function fetchGDELT(){
  try{
    const r=await fetch('https://api.gdeltproject.org/api/v2/doc/doc?query=global&mode=artlist&format=json&maxrecords=50',{signal:AbortSignal.timeout(1e4)});
    if(!r.ok)return[];
    const d=await r.json();
    return (d.articles||[]).map((a,i)=>({id:'gdelt-'+i,source:a.domain||'GDELT',title:a.title||'',link:a.url||'',date:a.seendate||new Date().toISOString(),desc:(a.summary||'').slice(0,500),cat:'general',importance:1}));
  }catch(e){return[]}
}

async function fetchYahooChart(symbol){
  try{
    const r=await fetch(`https://query1.finance.yahoo.com/v8/finance/chart/${encodeURIComponent(symbol)}?interval=1d&range=1mo`,{signal:AbortSignal.timeout(8e3)});
    if(!r.ok)return null;
    const d=await r.json();
    const meta=d.chart?.result?.[0]?.meta;
    if(!meta)return null;
    const c=meta.regularMarketPrice,p=meta.chartPreviousClose,ch=c-p;
    return{price:c,change:ch,changePercent:p?(ch/p)*100:0};
  }catch(e){return null}
}

async function fetchMarkets(){
  try{
    const [crypto,...indices]=await Promise.all([
      fetch('https://api.coingecko.com/api/v3/simple/price?ids=bitcoin,ethereum,solana,ripple,cardano,dogecoin,polkadot&vs_currencies=usd&include_24hr_change=true',{signal:AbortSignal.timeout(8e3)}).then(r=>r.ok?r.json():{}).catch(()=>({})),
      ...['^GSPC','^DJI','^IXIC','^FTSE','^N225','^HSI'].map(s=>fetchYahooChart(s)),
      ...['GC=F','CL=F','NG=F','SI=F','HG=F'].map(s=>fetchYahooChart(s)),
    ]);
    const result=[];
    const cmap={bitcoin:'BTC',ethereum:'ETH',solana:'SOL',ripple:'XRP',cardano:'ADA',dogecoin:'DOGE',polkadot:'DOT'};
    Object.entries(crypto).forEach(([id,v])=>{
      if(v&&v.usd)result.push({symbol:cmap[id]||id.toUpperCase(),name:id.charAt(0).toUpperCase()+id.slice(1),price:v.usd,change:v.usd_24h_change||0,cat:'crypto'});
    });
    const stockSymbols=['^GSPC','^DJI','^IXIC','^FTSE','^N225','^HSI'];
    const stockNames={'^GSPC':'S&P 500','^DJI':'Dow Jones','^IXIC':'Nasdaq','^FTSE':'FTSE 100','^N225':'Nikkei 225','^HSI':'Hang Seng'};
    indices.slice(0,6).forEach((d,i)=>{
      if(d)result.push({symbol:stockSymbols[i].replace('^',''),name:stockNames[stockSymbols[i]],cat:'stock',...d});
    });
    const commoditySymbols=['GC=F','CL=F','NG=F','SI=F','HG=F'];
    const commodityNames={'GC=F':'Gold','CL=F':'Crude Oil','NG=F':'Natural Gas','SI=F':'Silver','HG=F':'Copper'};
    indices.slice(6).forEach((d,i)=>{
      if(d)result.push({symbol:commoditySymbols[i].replace('=F',''),name:commodityNames[commoditySymbols[i]],cat:'commodity',...d});
    });
    markets=result;return result;
  }catch(e){return[]}
}

async function fetchEvents(){
  try{
    const [quakes,fires,gdacs,eonet]=await Promise.all([
      fetch('https://earthquake.usgs.gov/earthquakes/feed/v1.0/summary/2.5_day.geojson',{signal:AbortSignal.timeout(1e4)}).then(r=>r.ok?r.json():{features:[]}).catch(()=>({features:[]})),
      fetch('https://firms.modaps.eosdis.nasa.gov/api/country/csv/61e7f44abf26e6a543d6be87ad035c91/VIIRS_SNPP_NRT/USA/1',{signal:AbortSignal.timeout(1e4)}).then(r=>r.ok?r.text():'').catch(()=>''),
      fetch('https://www.gdacs.org/xml/rss_24h.xml',{signal:AbortSignal.timeout(8e3)}).then(r=>r.ok?r.text():'').catch(()=>''),
      fetch('https://eonet.gsfc.nasa.gov/api/v3/events/geojson?limit=50',{signal:AbortSignal.timeout(8e3)}).then(r=>r.ok?r.json():{features:[]}).catch(()=>({features:[]}))
    ]);
    const result=[];
    // earthquakes
    (quakes.features||[]).slice(0,50).forEach(f=>{
      result.push({id:f.id,type:'earthquake',title:f.properties.title,lat:f.geometry.coordinates[1],lon:f.geometry.coordinates[0],severity:f.properties.mag,date:new Date(f.properties.time).toISOString(),details:`Mag ${f.properties.mag}`});
    });
    // wildfires
    if(fires){
      fires.trim().split('\n').slice(1,50).forEach((line,i)=>{
        const c=line.split(',');
        if(c.length>10)result.push({id:'fire-'+i,type:'wildfire',title:`Wildfire ${c[8]||'N/A'}`,lat:parseFloat(c[0]),lon:parseFloat(c[1]),severity:c[9]==='h'?3:c[9]==='n'?2:1,date:c[5]||new Date().toISOString(),details:`FRP: ${c[10]||'N/A'}`});
      });
    }
    // GDACS disasters
    if(gdacs){
      try{
        const xml=new DOMParser().parseFromString(gdacs,'text/xml');
        [...xml.querySelectorAll('item')].forEach((item,i)=>{
          const title=item.querySelector('title')?.textContent||'';
          const desc=item.querySelector('description')?.textContent||'';
          const latMatch=desc.match(/lat:?\s*([-\d.]+)/i);
          const lonMatch=desc.match(/lon:?\s*([-\d.]+)/i);
          const lat=latMatch?parseFloat(latMatch[1]):null;
          const lon=lonMatch?parseFloat(lonMatch[1]):null;
          const type=title.toLowerCase().includes('cyclone')||title.toLowerCase().includes('hurricane')?'cyclone':
                     title.toLowerCase().includes('flood')?'flood':
                     title.toLowerCase().includes('volcano')||title.toLowerCase().includes('volcanic')?'volcano':
                     title.toLowerCase().includes('drought')?'drought':'disaster';
          if(lat&&lon)result.push({id:'gdacs-'+i,type,title:title.slice(0,100),lat,lon,severity:2,date:new Date().toISOString(),details:desc.slice(0,200)});
        });
      }catch(e){}
    }
    // EONET events (NASA)
    (eonet.features||[]).slice(0,30).forEach(f=>{
      const p=f.properties,c=f.geometry?.coordinates||[];
      if(!p||!c||c.length<2)return;
      const cat=(p.categories||[]).map(c=>c.title).join(' ');
      const type=cat.toLowerCase().includes('earthquake')?'earthquake':
                 cat.toLowerCase().includes('wildfire')||cat.toLowerCase().includes('fire')?'wildfire':
                 cat.toLowerCase().includes('volcano')?'volcano':
                 cat.toLowerCase().includes('flood')?'flood':
                 cat.toLowerCase().includes('storm')||cat.toLowerCase().includes('cyclone')?'cyclone':
                 cat.toLowerCase().includes('drought')?'drought':'disaster';
      result.push({id:'eonet-'+f.id,type,title:p.title.slice(0,100),lat:c[1],lon:c[0],severity:p.closed?0:2,date:p.date||p.time||new Date().toISOString(),details:`${cat.slice(0,100)}`});
    });
    events=result.sort((a,b)=>b.severity-a.severity);
    return result;
  }catch(e){return[]}
}

// ---- COUNTRY ANALYSIS ----
function analyzeCountries(){
  const cm=new Map();
  news.forEach(item=>{
    const t=(item.title||'').toLowerCase(),d=(item.desc||'').toLowerCase();
    Object.entries(COUNTRIES).forEach(([code,info])=>{
      const n=info.name.toLowerCase();
      if(t.includes(n)||d.includes(n)){
        if(!cm.has(code))cm.set(code,[]);
        cm.get(code).push(item);
      }
    });
  });
  countries=Object.entries(COUNTRIES).map(([code,info])=>{
    const items=cm.get(code)||[];
    const signals=new Set();
    items.forEach(item=>{
      Object.entries(SIGNAL_PATTERNS).forEach(([sig,patterns])=>{
        patterns.forEach(p=>{if(p.test(item.title)||p.test(item.desc))signals.add(sig)});
      });
    });
    const sigArr=[...signals].slice(0,5);
    let stability=70;
    const neg=['Conflict','Cyber','Economic','Sanctions','Protest'],pos=['Treaty','Diplomacy'];
    sigArr.forEach(s=>{if(neg.includes(s))stability-=10;if(pos.includes(s))stability+=5});
    stability-=Math.min(items.filter(x=>x.importance>1).length*2,20);
    stability=Math.max(5,Math.min(100,stability));
    const risk=stability>=70?'low':stability>=50?'medium':stability>=35?'elevated':stability>=20?'high':'critical';
    return{code,name:info.name,stability,newsCount:items.length,signals:sigArr,riskLevel:risk,lat:info.lat,lon:info.lon,pop:info.pop,gdp:info.gdp};
  }).filter(c=>c.newsCount>0||c.riskLevel!=='low').sort((a,b)=>a.stability-b.stability);
  updateIntelPanel();
}

// ---- UI RENDERS ----
function renderPanels(){
  pmarkets.innerHTML=`<div class="panel-header"><h3>📊 Markets</h3><div class="panel-controls"><select class="mtab"><option value="all">All</option><option value="crypto">Crypto</option><option value="stock">Stocks</option><option value="commodity">Commodities</option></select></div></div><div class="markets-grid" id="mgrid"></div>`;
  pnews.innerHTML=`<div class="panel-header"><h3><span class="pulse-dot"></span> Live News</h3><div class="panel-controls"><select class="nfilter"><option value="">All</option><option value="general">General</option><option value="military">Military</option><option value="finance">Finance</option><option value="tech">Tech</option><option value="cyber">Cyber</option><option value="energy">Energy</option><option value="positive">Positive</option><option value="science">Science</option></select></div></div><div class="news-items" id="nitems"></div><div class="news-status"><span id="ncount">0</span> articles · latest updates</div>`;
  pintel.innerHTML=`<div class="panel-header"><h3>🌍 Country Intel</h3></div><div class="depth-list" id="clist"></div>`;
  pevents.innerHTML=`<div class="panel-header"><h3>🔴 Active Events</h3><span class="badge" id="ecount">0</span></div><div class="events-ticker" id="eticker"></div>`;

  document.querySelector('.view-toggle')?.addEventListener('click',e=>{
    const btn=e.target.closest('.view-btn');if(!btn)return;
    document.querySelectorAll('.view-btn').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');setView(btn.dataset.view);
  });
  document.getElementById('refresh').addEventListener('click',()=>loadAll());
  document.getElementById('search').addEventListener('input',doSearch);
}

function doSearch(){
  try{
    const el=document.getElementById('search');if(!el)return;
    if(typeof el.value!=='string')return;
    const q=el.value.toLowerCase().trim();
    if(!Array.isArray(news))return;
    if(q){
      const filtered=[];
      for(let i=0;i<news.length;i++){
        const n=news[i];
        if(!n)continue;
        const txt=(n.title||'')+' '+(n.desc||'')+' '+(n.source||'');
        if(txt.toLowerCase().includes(q))filtered.push(n);
      }
      updateNewsList(filtered);
    }else updateNewsList(news);
    // filter country intel
    const clist=document.getElementById('clist');
    if(clist)clist.querySelectorAll('.country-card').forEach(c=>{
      const match=!q||c.textContent.toLowerCase().includes(q);
      c.style.display=match?'':'none';
    });
    // filter event ticker
    const eticker=document.getElementById('eticker');
    if(eticker)eticker.querySelectorAll('.event-item').forEach(e=>{
      const match=!q||e.textContent.toLowerCase().includes(q);
      e.style.display=match?'':'none';
    });
    // focus globe on matching country
    if(q){
      let found=null;
      Object.entries(COUNTRIES).some(([code,c])=>{
        if(c.name.toLowerCase().includes(q)){found=c;return true}
        return false;
      });
      if(found&&globe)globe.pointOfView({lat:found.lat,lng:found.lon,altitude:.8},800);
    }
  }catch(e){setStatus('error','Search error: '+e.message)}
}
function applySearchFilter(){doSearch();}
function updateNewsPanel(){doSearch();}
function updateNewsList(items){
  const el=document.getElementById('nitems'),cnt=document.getElementById('ncount');
  if(!el)return;
  cnt.textContent=items.length;
  const filter=document.querySelector('.nfilter');
  let filtered=items;
  if(filter&&filter.value)filtered=filtered.filter(n=>n.cat===filter.value);
  try{
    el.innerHTML=filtered.slice(0,80).map(n=>`
      <a href="${n.link}" target="_blank" rel="noopener" class="news-item${n.importance>1?' alert':''}">
        <div class="news-item-header"><span class="news-source">${esc(n.source)}</span><span class="news-cat tag-${n.cat}">${n.cat}</span><span class="news-time">${timeAgo(n.date)}</span></div>
        <div class="news-title">${esc(n.title)}</div>
        <div class="news-desc">${esc((n.desc||'').slice(0,200))}</div>
      </a>
    `).join('');
  }catch(e){setStatus('error','Render error: '+e.message)}
  if(filter)filter.onchange=doSearch;
}
function updateMarketsPanel(){
  const grid=document.getElementById('mgrid');if(!grid)return;
  const tab=document.querySelector('.mtab');
  function render(items){
    grid.innerHTML=items.slice(0,40).map(m=>`
      <div class="market-item ${m.change>=0?'up':'down'}">
        <div class="market-symbol">${m.symbol}</div>
        <div class="market-name">${esc(m.name)}</div>
        <div class="market-price">$${(m.price||0).toLocaleString(undefined,{minimumFractionDigits:2,maximumFractionDigits:2})}</div>
        <div class="market-change"><span class="${m.change>=0?'green':'red'}">${m.change>=0?'▲':'▼'} ${Math.abs(m.changePercent||m.change||0).toFixed(2)}%</span></div>
      </div>
    `).join('');
  }
  render(markets);
  if(tab)tab.onchange=()=>{
    const v=tab.value;
    if(v==='all')render(markets);
    else render(markets.filter(m=>m.cat===v));
  };
}
function updateEventsPanel(){
  const t=document.getElementById('eticker'),c=document.getElementById('ecount');
  if(!t)return;
  c.textContent=events.length;
  t.innerHTML=events.slice(0,30).map(e=>`
    <div class="event-item ${e.type}" title="${esc(e.details||'')}">
      <span class="event-icon">${e.type==='earthquake'?'🌍':e.type==='wildfire'?'🔥':e.type==='flood'?'🌊':e.type==='cyclone'?'🌀':e.type==='volcano'?'🌋':e.type==='drought'?'🏜️':'⚠️'}</span>
      <span class="event-title">${esc(e.title.slice(0,50))}</span>
      <span class="event-severity">${'●'.repeat(Math.min(Math.ceil(e.severity),5))}</span>
      <span class="event-time">${timeAgo(e.date)}</span>
    </div>
  `).join('');
}
function updateIntelPanel(){
  const el=document.getElementById('clist');if(!el)return;
  el.innerHTML=countries.slice(0,25).map(c=>`
    <div class="country-card ${c.riskLevel}" onclick="focusCountry('${c.code}')">
      <div class="country-header"><span class="country-name">${c.name}</span><span class="risk-badge risk-${c.riskLevel}">${c.riskLevel}</span></div>
      <div class="country-stats">
        <div class="stat"><span class="stat-label">Stability</span><div class="stability-bar"><div class="stability-fill" style="width:${c.stability}%"></div></div><span class="stat-value">${c.stability}/100</span></div>
        <div class="stat"><span class="stat-label">News</span>${c.newsCount}</div>
        ${c.gdp?`<div class="stat"><span class="stat-label">GDP</span> $${c.gdp}T</div>`:''}
        ${c.pop?`<div class="stat"><span class="stat-label">Pop</span> ${(c.pop/1e6).toFixed(1)}M</div>`:''}
      </div>
      ${c.signals.length?`<div class="country-signals">${c.signals.map(s=>`<span class="signal-tag">${s}</span>`).join('')}</div>`:''}
    </div>
  `).join('');
}
function focusCountry(code){
  const c=COUNTRIES[code];if(!c||!globe)return;
  globe.pointOfView({lat:c.lat,lng:c.lon,altitude:1.2},1e3);
}
function updateGlobe(){
  if(!globe)return;
  const pts=[];
  events.slice(0,30).forEach(e=>{
    pts.push({lat:e.lat,lon:e.lon,size:Math.min(e.severity/5,1),color:e.type==='earthquake'?'#ff4444':'#ff8800',label:e.title});
  });
  news.filter(n=>n.lat&&n.lon).slice(0,30).forEach(n=>{
    pts.push({lat:n.lat,lon:n.lon,size:.5+(n.importance*.3),color:n.importance>1?'#ff4444':'#4488ff',label:n.title.slice(0,100)});
  });
  countries.filter(c=>c.newsCount>2).slice(0,20).forEach(c=>{
    pts.push({lat:c.lat,lon:c.lon,size:.4,color:c.riskLevel==='critical'?'#ff4444':c.riskLevel==='high'?'#ff8833':c.riskLevel==='elevated'?'#ffcc33':'#44cc88',label:`${c.name} - ${c.riskLevel} risk`});
  });
  points=pts;
  globe.pointsData(points);globe.labelsData(points.filter(p=>p.size>.5));
}

function esc(s){const d=document.createElement('div');d.textContent=s;return d.innerHTML;}
function timeAgo(d){const s=(Date.now()-new Date(d).getTime())/1e3;if(s<60)return'now';if(s<3600)return Math.floor(s/60)+'m';if(s<86400)return Math.floor(s/3600)+'h';return Math.floor(s/86400)+'d';}

// ---- SIGNAL WORKER (inline) ----
setInterval(()=>{
  if(!news.length)return;
  const patterns={'ceasefire':/\bceasefire\b|\btruce\b/i,'sanctions':/\bsanctions?\b|\bembargo\b/i,'military':/\bmilitary\b|\btroops?\b|\bdeploy\b/i,'conflict':/\battack\b|\bstrike\b|\bmissile\b|\bbomb\b/i,'cyber':/\bcyber\b|\bhack\b|\bbreach\b|\bransomware\b/i};
  const signals={};
  news.slice(0,200).forEach(a=>{
    const t=(a.title||'')+' '+(a.desc||'');
    Object.entries(patterns).forEach(([k,p])=>{const m=(t.match(p)||[]).length;if(m>0)signals[k]=(signals[k]||0)+m});
  });
  const sorted=Object.entries(signals).sort((a,b)=>b[1]-a[1]).slice(0,5);
  const bar=document.getElementById('signals');
  if(sorted.length)bar.innerHTML=sorted.map(([n,c])=>`<span class="signal-chip">${n} (${c})</span>`).join('');
  else bar.innerHTML='';
},15000);

init();
